# ══════════════════════════════════════════════════════════════
# 说明:
#   ${女主} 表示四位女主之一: 苏梦璃 / 柳清梦 / 林雨涵 / 墨瑾萱
#   ${章节} 表示五个秘密章节之一:
#     秘密_家庭背景 / 秘密_过往经历 / 秘密_内心伤痛 / 秘密_真实目的 / 秘密_最深禁忌
#   各 NPC 共用结构合并书写, 专属字段单列
# ══════════════════════════════════════════════════════════════
---
变量更新规则:
  # ── 世界 ─────────────────────────────────
  世界:
    当前日期:
      check:
        - 仅当剧情明确跨日才推进, 单一场景内不更新
    当前时间段:
      合法值: [清晨, 上午, 下午, 傍晚, 夜晚, 深夜]
      check:
        - 按上方顺序单格推进, 除非剧情明确跳跃
    当前星期:
      合法值: [周一, 周二, 周三, 周四, 周五, 周六, 周日]
      check:
        - 跟随 当前日期 同步
    天气:
      check:
        - 仅当剧情明确描写天气变化时更新

  # ── 主角.基础 ─────────────────────────────
  主角:
    坐标:
      type: '{ x: number; y: number }'
      check:
        - 主角移动后, 同步为 _城市地图.地点列表[当前地点ID].坐标 的值
        - 不允许 AI 自行编造坐标
    当前地点ID:
      check:
        - 必须是 _城市地图.地点列表 中已存在的 key
    精神状态:
      type: number
      range: 0~100
      check:
        - 重大刺激±10~20, 日常波动±3~8
    精力:
      type: number
      range: 0~100
      check:
        - 工作/激烈活动-10~25, 睡眠+30~60, 时段切换自然-5
    饥饿度:
      type: number
      range: 0~100
      check:
        - 进食-30~60, 时段切换+8~15
    社交需求:
      type: number
      range: 0~100
      check:
        - 有效交流-10~30, 独处+3~5
    当前情绪:
      check:
        - 单词或短语, 主角当下主导情绪
    CG外观:
      type: |-
        {
          当前服装: string;
          当前表情: string;
          当前姿态: string;
          当前场景背景: string;
          特殊状态标注: string;
        }
      check:
        - 服装在换装时更新, 表情/姿态可每幕变
        - 场景背景跟随 当前地点ID
        - 负伤/醉酒/情欲等异常写入 特殊状态标注

    # ── 主角.职业 ──
    职业:
      当前职业:
        合法值:
          - 待业          # 工作地点: home_主角, 月收入: 0
          - 自由职业       # 工作地点: home_主角, 月收入: 视稿件而定
          - 学生           # 工作地点: university_主校区, 月收入: 0
          - 实习生         # 工作地点: 视实习单位, 月收入: 1500
          - 苏氏集团基层员工 # 工作地点: office_苏氏集团, 月收入: 8000
          - IT工程师       # 工作地点: office_IT公司, 月收入: 12000
          - 咖啡师         # 工作地点: cafe_星轨, 月收入: 4500
          - 酒保           # 工作地点: bar_深夜咖啡馆, 月收入: 5000
          - 超市收银员     # 工作地点: supermarket_永辉, 月收入: 3500
          - 茶馆学徒       # 工作地点: teahouse_清梦阁, 月收入: 3000
          - 古董助理       # 工作地点: teahouse_清梦阁, 月收入: 4000
          - 主播           # 工作地点: studio_梦璃直播, 月收入: 视流量
          - 助理编辑       # 工作地点: home_主角, 月收入: 5000
          - 健身教练       # 工作地点: 需另行添加地点, 月收入: 6000
        check:
          - 只能从上方合法值中选择, 禁止自行创造新职业名称
          - 切换时必须同步更新 工作地点ID 和 月固定收入
      职位称谓:
        check:
          - 由当前职业决定的具体岗位称呼, 如 "IT工程师" → "后端开发工程师"
      工作地点ID:
        check:
          - 必须是 _城市地图.地点列表 中已存在的 key
          - 参考上方合法值注释中的对应地点
      职业经验:
        type: number
        check:
          - 完成本职工作+5~15, 重大成就+30~50, 严重失误-10~20
          - 不要直接改 职业等级 (由脚本同步)
      专业技能:
        type: |-
          { [技能名: string]: number }
        check:
          - 实践+1~5, 专门训练+5~10, 数值范围 0~100
          - 技能名必须与当前职业相关 (编程/调酒/鉴定/写作/音乐/谈判 等)
      工作压力:
        type: number
        range: 0~100
        check:
          - 加班/被批评+10~25, 休息/被肯定-10~20
      上司对主角态度:
        check:
          - 仅在工作表现显著影响关系时更新
      今日是否上班:
        type: boolean
        check:
          - 工作日的上午或下午, 主角在工作地点时为 true
      最近工作表现:
        check:
          - 短句概括, 仅在表现显著好/差时更新

    # ── 主角.经济 ──
    经济:
      现金:
        type: number
        check:
          - 严格按剧情发生的收支金额加减
          - 现金不足时交易必须失败, 不可强行扣为负
      银行存款:
        type: number
        check:
          - 工资入账或转账时更新
      月固定收入:
        type: number
        check:
          - 由 当前职业 决定, 仅在换工作时更新
      月固定支出:
        type: number
        check:
          - 房租/水电/订阅等固定项变动时更新
      本月已收入:
        type: number
        check:
          - 每次入账累加; 不要自行重置 (脚本月初处理)
      本月已支出:
        type: number
        check:
          - 每次支出累加; 不要自行重置
      负债:
        type: number
        check:
          - 借款+, 还款-, 不可为负
      信用等级:
        合法值: [差, 一般, 良好, 优秀, 顶级]
        check:
          - 仅在重大金融事件后更新 (多次按时还款 / 违约 / 大额贷款)
      经济阶层:
        合法值: [贫困, 温饱, 小康, 中产, 富裕, 顶级]
        check:
          - 由 现金+银行存款 整体水平决定, 跨档时才更新
      资产:
        type: |-
          { [资产名: string]: { 估值: number; 描述: string } }
        check:
          - 购入房产/车/珠宝等大件时 insert, 卖出/损毁时 remove

  # ══════════════════════════════════════════
  # 四女主共用结构 (${女主} ∈ 苏梦璃/柳清梦/林雨涵/墨瑾萱)
  # ══════════════════════════════════════════
  ${女主}:
    坐标:
      type: '{ x: number; y: number }'
      check:
        - 同步为 _城市地图.地点列表[当前地点ID].坐标
        - 不允许 AI 自行编造坐标
    当前地点ID:
      check:
        - 必须是 _城市地图.地点列表 中已存在的 key
        - 跟随她当前所在位置同步
    好感度经验:
      type: number
      check:
        - 普通互动+1~3, 深入交流+5~8, 重要正面事件+10~15
        - 冒犯-3~10, 背叛-15~30
        - 单回合变化绝对值≤15
        - 严禁直接修改 好感度等级 与 当前态度 (由脚本根据本字段自动同步)
    信任度:
      type: number
      range: 0~100
      check:
        - 守信/可靠行为+2~5, 背叛/谎言-10~20
        - 与 好感度经验 独立: 喜欢不等于信任
    关系阶段:
      合法值: [陌生人, 普通朋友, 亲密朋友, 暧昧, 恋人, 挚爱]
      check:
        - 推进顺序严格按上方顺序, 单次只能推进一档
        - 须有明确剧情节点 (告白/牵手/初吻/初夜 等)
        - 严重决裂可回退, 不可跳级
    当前情绪:
      check:
        - 单词或短语, 她当下的主导情绪
    今日是否见面:
      type: boolean
      check:
        - 与主角面对面或语音视频接触时为 true
    连续未联系天数:
      type: number
      check:
        - 跨日且未联系+1, 有联系归 0
    对主角的印象标签:
      type: |-
        { [印象词: string]: boolean }
      check:
        - 她形成新印象时 insert, 印象被颠覆时改为 false 或 remove
        - 印象词应简短 (2~4 字), 如 "可靠" / "花心" / "温柔"
    重要共同记忆:
      type: |-
        { [事件名: string]: string }
      check:
        - 只记录她真正在意的事件, 3~6 字事件名 + 一句话她的主观感受
    主角评价:
      check:
        - 一句话, 她对主角的当前整体评价, 用她自己的口吻
        - 主角看不到, 不会出现在剧情对白中
    内心OS:
      type: |-
        {
          对主角的真实想法: string;
          当前最在意的事: string;
          不会说出口的话: string;
          此刻的欲望: string;
        }
      check:
        - 反映她未说出口的真实心理, 与表面言行可以截然相反
        - 主角看不到, 不会出现在剧情对白中
    CG外观:
      type: |-
        {
          当前服装: string;
          当前表情: string;
          当前姿态: string;
          当前场景背景: string;
          特殊状态标注: string;
        }
      check:
        - 换装/换姿态/换场景时更新
        - 情欲/醉酒/受伤/失态等异常写入 特殊状态标注, 平时为空

    NSFW:
      身体敏感度:
        type: number
        range: 0~100
        check:
          - 长期属性, 单回合±0~3
      乳头敏感度:
        type: number
        range: 0~100
        check:
          - 长期属性, 单回合±0~3
      阴蒂敏感度:
        type: number
        range: 0~100
        check:
          - 长期属性, 单回合±0~3
      当前身体状态:
        check:
          - 直白短语, 例: 双腿发软 / 内裤已濡湿 / 乳尖挺立 / 高潮余韵
          - 情欲场景结束后回归 "正常"
      当前湿润程度:
        type: number
        range: 0~100
        check:
          - 情欲场景中实时变化, 非情欲场景为 0
      当前情欲温度:
        type: number
        range: 0~100
        check:
          - 与 当前湿润程度 同步; 高潮时拉满, 事后递减
      当前欲求程度:
        type: number
        range: 0~100
        check:
          - 公开癖好触发条件 满足时+15~30
          - 最隐秘性癖触发条件 满足时+30~50
          - 非情欲场景应缓慢回落
      欲求触发原因:
        check:
          - 简短说明诱因, 无诱因时清空
      今日自慰次数:
        type: number
        check:
          - 发生时+1, 不要自行重置 (脚本跨日处理)
      处女状态:
        type: boolean
        check:
          - 首次插入式性行为后改为 false, 不可逆
      初吻是否给主角:
        type: boolean
        check:
          - 她从未与他人接吻, 且此次与主角发生初吻时为 true
      初夜是否给主角:
        type: boolean
        check:
          - 处女状态 为 true 且此次与主角发生关系时, 改为 true
      与主角已发生关系次数:
        type: number
        check:
          - 完成一次性行为+1
      解锁的体位:
        type: |-
          { [体位名: string]: boolean }
        check:
          - 首次完成某体位时 insert 并设为 true
      解锁的场所:
        type: |-
          { [场所名: string]: boolean }
        check:
          - 首次在该场所完成性行为时 insert
          - 场所名应对应 _城市地图 中的地点名
      经历记录:
        type: |-
          { [事件名: string]: string }
        check:
          - 重大或首次性事件后 insert
          - 3~6 字事件名 + 一句直白具体的过程描述
      是否已暴露最隐秘性癖:
        type: boolean
        check:
          - 当 最隐秘性癖触发条件 满足且该幻想真正发生时, 改为 true
          - 同时必须同步设置 本回合刚暴露最隐秘性癖 为 true
          - 一旦置 true 不可逆
      本回合刚暴露最隐秘性癖:
        type: boolean
        check:
          - 与 是否已暴露最隐秘性癖 同步首次置为 true
          - 不要自行改回 false (由脚本在下回合重置)

  # ══════════════════════════════════════════
  # 苏梦璃专属
  # ══════════════════════════════════════════
  苏梦璃:
    直播状态:
      合法值: [未开播, 直播中, 录制中, 休息]
      check:
        - 跟随她当前活动同步
    粉丝好感度:
      type: number
      range: 0~100
      check:
        - 直播表现好+1~3, 翻车/失言-5~15
    家族压力值:
      type: number
      range: 0~100
      check:
        - 家族来电/见面+5~15, 与家族对抗+10~20, 主角宽慰-5~10
    隐藏身份是否暴露:
      type: boolean
      check:
        - 主角真正得知她是苏氏二小姐时改为 true, 不可逆

  # ══════════════════════════════════════════
  # 柳清梦专属
  # ══════════════════════════════════════════
  柳清梦:
    茶馆今日营业:
      type: boolean
    当前在鉴定的古董:
      check:
        - 鉴定中填名称, 结束后清空
    古董圈声望:
      type: number
      range: 0~100
      check:
        - 鉴定准确+1~3, 看走眼/拒接大单-3~10
    暗盘债务剩余:
      type: number
      check:
        - 还款时-对应金额, 不可为负
    对主角的捉弄计划:
      check:
        - 她设计中的下一个捉弄, 执行后清空

  # ══════════════════════════════════════════
  # 林雨涵专属
  # ══════════════════════════════════════════
  林雨涵:
    当前黑客任务:
      check:
        - 进行中的任务简短名称, 完成后清空
    黑客圈声望:
      type: number
      range: 0~100
      check:
        - 完成漂亮任务+2~5, 任务失败/被反追踪-5~15
    混乱值:
      type: number
      range: 0~100
      check:
        - 受规训/被否定/被催就医+10~20
        - 被理解/独处自由-10~20
        - 混乱值≥70 会触发她公开癖好相关身体反应
    当前在研究的漏洞:
      check:
        - 简短描述目标系统类型, 研究结束后清空
    父母关系紧张度:
      type: number
      range: 0~100
      check:
        - 父母接触+3~10, 提及服药/治疗+15~30
        - 主角调和-5~15

  # ══════════════════════════════════════════
  # 墨瑾萱专属
  # ══════════════════════════════════════════
  墨瑾萱:
    家族联系频率:
      type: number
      range: 0~100
      check:
        - 家族电话/催婚+5~15, 主角帮她应付-3~8
    武学修为:
      type: number
      range: 0~100
      check:
        - 长期属性, 单回合±0~2; 实战或专门修炼+2~5
    今日是否被异样眼光注视:
      type: boolean
      check:
        - 公共场合穿汉元素被路人侧目时为 true
    喜欢的夜市摊位:
      type: |-
        { [摊位名: string]: boolean }
      check:
        - 在夜市发现新喜欢的摊位时 insert

  # ══════════════════════════════════════════
  # 滚动总结系统
  # ══════════════════════════════════════════
  _总结系统:

    小总结:
      type: |-
        {
          [key: string]: {
            时间: string;
            地点: string;
            在场人物: string[];
            事件: string;
            各人物状态变化: string;
            情感进展: string;
          }
        }
      check:
        - 每回合正文结束后必须 insert 一条, key 格式 "YYYYMMDD_序号" 如 "20240301_01"
        - 同一天多条时序号递增: _01 / _02 / _03
        - 事件: 50字内, 记录本回合发生了什么
        - 各人物状态变化: 格式 "名字|好感度经验±N|信任度±N|关系阶段变化(无则省略)"
        - 情感进展: 30字内, 本回合最重要的情感变化, 无则写 "无"
        - 当 _汇总信号.需要汇总小总结 为 true 时 (见下方汇总规则), 执行汇总后用 remove 删除所有小总结条目

    大总结:
      type: |-
        {
          [key: string]: {
            时间跨度: string;
            主线事件: string;
            各NPC关系进展: string;
            已解锁背景: string[];
            重要转折: string;
          }
        }
      check:
        - 仅在汇总小总结时 insert 一条, key 格式 "S_YYYYMMDD"
        - 主线事件: 150字内, 这段时间的核心剧情脉络
        - 各NPC关系进展: 每位NPC一行, 格式 "名字|等级Lv→Lv|关系阶段|信任度|关键变化"
        - 已解锁背景: 这段时间内解锁的背景章节名称列表, 无则为空数组
        - 重要转折: 50字内, 最重要的一个剧情转折点
        - 当 _汇总信号.需要汇总大总结 为 true 时 (见下方汇总规则), 执行汇总后用 remove 删除所有大总结条目

    历史档案:
      type: |-
        {
          [key: string]: {
            章节标题: string;
            时间跨度: string;
            故事梗概: string;
            关系里程碑: string[];
            世界观变化: string;
          }
        }
      check:
        - 仅在汇总大总结时 insert 一条, key 格式 "H_001" / "H_002" 依次递增
        - 章节标题: 5~10字, 概括这段历史的主题
        - 故事梗概: 300字内, 完整叙述这段历史
        - 关系里程碑: 各NPC关系的重要节点, 格式 "名字|事件|关系变化"
        - 世界观变化: 主角对这个世界/这些人的认知发生了什么根本变化
        - 历史档案永久保留, 禁止删除

    汇总规则:
      当需要汇总小总结时:
        - 触发条件: _汇总信号.需要汇总小总结 为 true
        - 步骤1: 阅读所有小总结条目
        - 步骤2: insert 一条大总结 (key: S_当前日期)
        - 步骤3: remove 所有小总结条目 (逐条 remove)
        - 步骤4: 不要修改 _汇总信号 (由脚本清除)
      当需要汇总大总结时:
        - 触发条件: _汇总信号.需要汇总大总结 为 true
        - 步骤1: 阅读所有大总结条目
        - 步骤2: insert 一条历史档案 (key: H_xxx, xxx 为当前历史档案数量+1, 补零到3位)
        - 步骤3: remove 所有大总结条目 (逐条 remove)
        - 步骤4: 不要修改 _汇总信号 (由脚本清除)
      注意:
        - 两种汇总可能同时触发 (先汇总小总结, 再汇总大总结)
        - 汇总时不要生成正文剧情, 只输出 JSONPatch 命令

  # ══════════════════════════════════════════
  # 全局旗标
  # ══════════════════════════════════════════
  $flag:
    type: |-
      { [旗标名: string]: boolean }
    check:
      - 用于标记关键剧情节点 (如 首次约会 / 告白成功 / 同居 等)
      - 一旦置 true 通常不再变更

# ══════════════════════════════════════════════════════════════
# 禁止更新的字段 (AI 不得输出针对它们的更新命令)
# ══════════════════════════════════════════════════════════════
禁止更新:
  # 地图只读
  - _城市地图.*

  # 由脚本根据 好感度经验 自动同步
  - ${女主}.好感度等级
  - ${女主}.当前态度

  # 固定特征, 不随剧情变化
  - ${女主}.基础外貌.*
  - ${女主}.主要性格
  - ${女主}.次要性格
  - ${女主}.隐藏性格

  # 背景档案中的固定文本由人设确定, 不可改写
  - ${女主}.背景档案.公开档案
  - ${女主}.背景档案.${章节}.章节主题
  - ${女主}.背景档案.${章节}.详细内容
  - ${女主}.背景档案.${章节}.解锁条件描述

  # 由脚本根据数值条件自动判断, AI 不主动解锁也不主动重置
  - ${女主}.背景档案.${章节}.已解锁
  - ${女主}.背景档案.${章节}.本回合刚解锁

  # 总结系统：汇总信号由脚本写入/清除，AI 不得修改
  - _总结系统._汇总信号.*

  # 历史档案永久保留，AI 不得删除
  - _总结系统.历史档案.*
