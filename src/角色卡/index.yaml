世界书名称: 与角色卡名称相同
条目:
  - 名称: 运行逻辑
    启用: true
    激活策略:
      类型: 蓝灯
    插入位置:
      类型: 指定深度
      角色: 系统
      深度: 0
      顺序: 14720
